<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBake – Sign Up</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('/images/wheat.jpg'); /* your donuts image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .register-wrapper {
            position: relative;
            z-index: 2;
            background: rgba(28, 28, 28, 0.88);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter : blur(12px);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            width: 480px;
            max-width: 90%;
            text-align: center;
            border: 1px solid rgba(233,30,99,0.15);
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent-pink);
            margin-bottom: 1.2rem;
            letter-spacing: 4px;
            text-shadow: 0 4px 12px rgba(233,30,99,0.3);
        }
        h2 {
            color: var(--text-primary);
            margin-bottom: 2rem;
            font-size: 1.9rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 1.1rem;
            margin: 0.8rem 0;
            border: 1px solid #444;
            border-radius: 12px;
            background: #2a2a2a;
            color: var(--text-primary);
            font-size: 1.05rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 4px rgba(233,30,99,0.25);
        }
        button {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-pink-dark));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 1.5rem;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(233,30,99,0.5);
        }
        .login-link {
            margin-top: 2rem;
            font-size: 1rem;
            color: var(--text-secondary);
        }
        .login-link a {
            color: var(--accent-gold);
            font-weight: 600;
            transition: color 0.3s;
        }
        .login-link a:hover {
            color: #ffe082;
        }
        .form-group {
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="register-wrapper">
        <div class="logo">SMARTBAKE</div>
        <h2>Create Your Account</h2>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <button type="submit">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>

</body>
</html>
