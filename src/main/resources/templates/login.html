<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBake – Sign In</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('/images/croissants.jpg'); /* your croissant tray image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .login-wrapper {
            position: relative;
            z-index: 2;
            background: rgba(28, 28, 28, 0.88);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter : blur(12px);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            width: 420px;
            max-width: 90%;
            text-align: center;
            border: 1px solid rgba(233,30,99,0.15);
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent-pink);
            margin-bottom: 1.2rem;
            letter-spacing: 4px;
            text-shadow: 0 4px 12px rgba(233,30,99,0.3);
        }
        h2 {
            color: var(--text-primary);
            margin-bottom: 2rem;
            font-size: 1.9rem;
            font-weight: 600;
        }
        .error-box {
            background: rgba(244,67,54,0.18);
            color: #ff8a80;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.8rem;
            font-size: 0.95rem;
            border: 1px solid rgba(244,67,54,0.3);
        }
        .success-box {
            background: rgba(76,175,80,0.18);
            color: #a5d6a7;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.8rem;
            font-size: 0.95rem;
            border: 1px solid rgba(76,175,80,0.3);
        }
        input {
            width: 100%;
            padding: 1.1rem;
            margin: 0.9rem 0;
            border: 1px solid #444;
            border-radius: 12px;
            background: #2a2a2a;
            color: var(--text-primary);
            font-size: 1.05rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 4px rgba(233,30,99,0.25);
        }
        button {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-pink-dark));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 1.2rem;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(233,30,99,0.5);
        }
        .signup-link {
            margin-top: 2rem;
            font-size: 1rem;
            color: var(--text-secondary);
        }
        .signup-link a {
            color: var(--accent-gold);
            font-weight: 600;
            transition: color 0.3s;
        }
        .signup-link a:hover {
            color: #ffe082;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="logo">SMARTBAKE</div>
        <h2>Welcome Back</h2>

        <div th:if="${param.error}" class="error-box">
            Invalid email or password. Please try again.
        </div>

        <div th:if="${param.logout}" class="success-box">
            You've been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Email (username)" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="/register">Sign Up</a>
        </div>
    </div>

</body>
</html>
