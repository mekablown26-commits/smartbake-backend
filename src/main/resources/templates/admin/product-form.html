<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product – SmartBake Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            background-image: url('/images/glazed donuts.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .form-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 3rem 2.5rem;
            background: rgba(28, 28, 28, 0.88);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(233,30,99,0.15);
        }
        h1 {
            text-align: center;
            color: var(--accent-pink);
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }
        .form-group {
            margin-bottom: 1.8rem;
        }
        label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: var(--text-primary);
            font-size: 1.05rem;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 4px rgba(233,30,99,0.25);
        }
        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-pink-dark));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(233,30,99,0.5);
        }
        .preview-img {
            max-width: 200px;
            margin: 1rem auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Add New Product</h1>

        <form th:action="@{/admin/products}" th:object="${product}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="price">Price (KSh)</label>
                <input type="number" id="price" th:field="*{price}" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="stock">Stock Quantity</label>
                <input type="number" id="stock" th:field="*{stock}" required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" th:field="*{category}">
                    <option value="Pastries">Pastries</option>
                    <option value="Cakes">Cakes</option>
                    <option value="Donuts">Donuts</option>
                    <option value="Macarons">Macarons</option>
                    <option value="Tartlets">Tartlets</option>
                    <!-- add more as needed -->
                </select>
            </div>

            <div class="form-group">
                <label for="image">Product Image</label>
                <input type="file" id="image" name="imageFile" accept="image/*">
                <img id="preview" class="preview-img" src="#" alt="Preview" style="display:none;">
            </div>

            <button type="submit" class="btn-submit">Save Product</button>
        </form>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="/admin/products" class="btn btn-primary">← Back to Products</a>
        </div>
    </div>

    <script>
        document.getElementById('image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
