<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Added – SmartBake Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            background-image: url('/images/glazed-donuts.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .success-container {
            max-width: 700px;
            margin: 6rem auto 4rem;
            padding: 3.5rem 2.5rem;
            background: rgba(40,40,40,0.94);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.7);
            border: 1px solid rgba(233,30,99,0.25);
            text-align: center;
            color: var(--text-primary);
        }
        h1 {
            color: var(--accent-pink);
            font-size: 3.2rem;
            margin: 0 0 1.5rem;
            text-shadow: 0 4px 15px rgba(233,30,99,0.5);
        }
        .emoji-confetti {
            font-size: 7rem;
            margin: 1rem 0 2rem;
            animation: bounce 2.5s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-25px); }
            60% { transform: translateY(-12px); }
        }
        .message {
            font-size: 1.6rem;
            color: #4caf50;
            font-weight: 600;
            margin: 1.5rem 0 2.5rem;
            line-height: 1.5;
        }
        .product-preview {
            background: rgba(233,30,99,0.08);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px solid rgba(233,30,99,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .product-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid rgba(233,30,99,0.4);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .product-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-gold);
        }
        .product-price {
            font-size: 1.9rem;
            font-weight: 700;
            color: white;
        }
        .btn-group {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .btn {
            padding: 1.2rem 2.8rem;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--accent-pink);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-pink-dark);
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(233,30,99,0.5);
        }
        .btn-secondary {
            background: var(--accent-gold);
            color: #0a0a0a;
        }
        .btn-secondary:hover {
            background: #d4a017;
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(244,196,48,0.5);
        }
        .back-link {
            margin-top: 2.5rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--accent-pink);
        }
        @media (max-width: 768px) {
            .success-container { margin: 4rem 1.5rem; padding: 2.5rem 1.8rem; }
            h1 { font-size: 2.6rem; }
            .emoji-confetti { font-size: 5.5rem; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="emoji-confetti">🎉🍰</div>
        <h1>Product Added Successfully!</h1>

        <div class="message">
            Your new bakery item is now live in the catalog!<br>
            Ready to add more treats? ✨
        </div>

        <div class="product-preview">
            <img th:src="${product.imageUrl} ?: '/images/placeholder-treat.jpg'" 
                 th:alt="${product.name}"
                 th:title="${product.name}"
                 title="Product Image"
                 class="product-img">

            <div class="product-name" th:text="${product.name}"></div>
            <div class="product-price" th:text="${product.price} + ' KSh'"></div>
        </div>

        <div class="btn-group">
            <a href="/admin/products/add" class="btn btn-primary">+ Add Another Product</a>
            <a href="/admin/products" class="btn btn-secondary">Back to Product List</a>
        </div>

        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>

</body>
</html>
