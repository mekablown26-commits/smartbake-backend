<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details – SmartBake Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-dark);
        }
        .admin-container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
        }
        .order-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(233,30,99,0.12);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .info-item {
            background: rgba(30,30,30,0.6);
            padding: 1.2rem;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .info-item strong {
            color: var(--accent-pink);
            display: block;
            margin-bottom: 0.5rem;
        }
        .status-badge {
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-block;
            margin: 1rem 0;
        }
        .status-pending  { background: #4a2c00; color: #ff9800; }
        .status-processing { background: #0d3c61; color: #4fc3f7; }
        .status-ready     { background: #1b5e20; color: #81c784; box-shadow: 0 0 15px rgba(129,199,132,0.4); }
        .status-delivered { background: #2e7d32; color: #a5d6a7; box-shadow: 0 0 15px rgba(165,214,167,0.4); }
        .status-cancelled { background: #4a0000; color: #ef5350; }
        .form-group {
            margin: 1.5rem 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        select, input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: var(--text-primary);
            font-size: 1.05rem;
        }
        .btn-save {
            padding: 1rem 2.5rem;
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-save:hover {
            background: var(--accent-pink-dark);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(233,30,99,0.4);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        th {
            background: rgba(233,30,99,0.15);
            color: var(--accent-pink);
            padding: 1.2rem;
            text-align: left;
        }
        td {
            padding: 1.2rem;
            border-bottom: 1px solid #333;
        }
        .total-row {
            font-weight: 700;
            background: rgba(244,196,48,0.1);
        }
    </style>
</head>
<body class="bg-image" style="background-image: url('/images/filled donuts.jpg');">

    <div class="admin-container">
        <div class="header">
            <h1>Order Details</h1>
            <p style="color: var(--text-muted);">Order Number: <strong th:text="${orderNumber} ?: 'SB-' + ${order.id}"></strong></p>
        </div>

        <!-- Flash Messages -->
        <div th:if="${message}" class="success-box" style="margin-bottom: 2rem;">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="error-box" style="margin-bottom: 2rem;">
            <span th:text="${error}"></span>
        </div>

        <!-- Main Order Card -->
        <div class="order-card">
            <div class="info-grid">
                <div class="info-item">
                    <strong>Customer</strong>
                    <span th:text="${order.user.email}"></span>
                </div>
                <div class="info-item">
                    <strong>Placed On</strong>
                    <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy, HH:mm')}"></span>
                </div>
                <div class="info-item">
                    <strong>Payment</strong>
                    <span th:text="${order.paymentMethod == 'CASH' ? 'Cash on Delivery' : order.paymentMethod == 'PAYBILL' ? 'Paybill' : 'Card (Coming soon)'}"></span>
                </div>
                <div class="info-item">
                    <strong>Total</strong>
                    <span th:text="${order.totalAmount} + ' KSh'"></span>
                </div>
            </div>

            <div style="text-align: center; margin: 2rem 0;">
                <div class="status-badge" th:classappend="'status-' + ${#strings.toLowerCase(order.status)}">
                    <span th:text="${order.status ?: 'Not Set'}"></span>
                </div>
            </div>

            <!-- Status Update Form -->
            <div class="form-group" th:if="${isAdmin}">
                <form th:action="@{/admin/orders/{id}/update-status(id=${order.id})}" method="post">
                    <label for="status">Update Status</label>
                    <select name="status" id="status">
                        <option value="PENDING" th:selected="${order.status == 'PENDING'}">PENDING</option>
                        <option value="PROCESSING" th:selected="${order.status == 'PROCESSING'}">PROCESSING</option>
                        <option value="READY" th:selected="${order.status == 'READY'}">READY</option>
                        <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
                        <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
                    </select>
                    <button type="submit" class="btn-save">Save Status</button>
                </form>
            </div>

            <!-- Rider / Delivery Info -->
            <div th:if="${isAdmin}" class="form-group" style="margin-top: 3rem;">
                <h3>Set Delivery Info</h3>
                <form th:action="@{/admin/orders/{id}/update-delivery(id=${order.id})}" method="post">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div>
                            <label for="riderName">Rider Name</label>
                            <input type="text" id="riderName" name="riderName" th:value="${order.riderName}">
                        </div>
                        <div>
                            <label for="riderPhone">Rider Phone</label>
                            <input type="text" id="riderPhone" name="riderPhone" th:value="${order.riderPhone}">
                        </div>
                        <div>
                            <label for="riderBikePlate">Bike Plate</label>
                            <input type="text" id="riderBikePlate" name="riderBikePlate" th:value="${order.riderBikePlate}">
                        </div>
                        <div>
                            <label for="deliveryFee">Delivery Fee (KSh)</label>
                            <input type="number" id="deliveryFee" name="deliveryFee" th:value="${order.deliveryFee}" step="0.01">
                        </div>
                    </div>
                    <button type="submit" class="btn-save" style="margin-top: 1.5rem;">Save Delivery Info</button>
                </form>
            </div>

            <!-- Rider Info Display -->
            <div th:if="${order.riderName != null}" style="margin-top: 2.5rem; padding: 1.5rem; background: rgba(46,125,50,0.15); border-radius: 16px;">
                <h3>Delivery Details</h3>
                <p><strong>Rider:</strong> <span th:text="${order.riderName}"></span> (<span th:text="${order.riderPhone}"></span>)</p>
                <p><strong>Bike:</strong> <span th:text="${order.riderBikePlate}"></span></p>
                <p><strong>Fee:</strong> <span th:text="${order.deliveryFee} + ' KSh'"></span></p>
            </div>
        </div>

        <!-- Ordered Items Table -->
        <div class="order-card">
            <h2>Ordered Items</h2>
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price per Unit</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.items}">
                        <td th:text="${item.product.name}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${item.priceAtPurchase} + ' KSh'"></td>
                        <td th:text="${item.subtotal} + ' KSh'"></td>
                    </tr>
                    <tr class="total-row">
                        <td colspan="3" style="text-align: right;">Total:</td>
                        <td th:text="${order.totalAmount} + ' KSh'"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="text-align: center; margin: 3rem 0;">
            <a th:if="${isAdmin}" href="/admin/orders" class="btn btn-primary">← Back to Orders List</a>
            <a th:unless="${isAdmin}" href="/my-orders" class="btn btn-primary">← Back to My Orders</a>
        </div>
    </div>

</body>
</html>
