<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Treats – SmartBake</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            margin: 0;
            background-image: url('/images/cupcakes.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .container { max-width: 1200px; margin: 4rem auto; padding: 0 1.5rem; }
        h1 { text-align: center; color: var(--accent-pink); font-size: 3rem; margin-bottom: 3rem; text-shadow: 0 4px 12px rgba(233,30,99,0.3); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; }
        .product-card {
            background: rgba(40,40,40,0.9);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
            border: 1px solid rgba(233,30,99,0.15);
        }
        .product-card:hover { transform: translateY(-15px); box-shadow: 0 25px 60px rgba(233,30,99,0.3); }
        .product-img { width: 100%; height: 280px; object-fit: cover; }
        .product-body { padding: 2rem; text-align: center; }
        .product-name { font-size: 1.6rem; color: var(--text-primary); margin-bottom: 0.8rem; }
        .product-price { font-size: 1.8rem; font-weight: 700; color: var(--accent-gold); margin-bottom: 1rem; }
        .product-desc { color: var(--text-secondary); margin-bottom: 1.5rem; min-height: 3.5rem; }
        .add-form { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .quantity { width: 80px; padding: 0.8rem; border-radius: 12px; border: 1px solid #444; background: #2a2a2a; color: white; text-align: center; }
        .btn-add { padding: 0.9rem 2rem; background: var(--accent-pink); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-add:hover { background: var(--accent-pink-dark); transform: translateY(-3px); box-shadow: 0 12px 30px rgba(233,30,99,0.4); }
        .no-products { text-align: center; color: var(--text-muted); font-size: 1.6rem; padding: 6rem 0; }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: right; margin-bottom: 1rem;">
    <a href="/cart" style="color: var(--accent-gold); font-weight: bold; text-decoration: none;">
        🛒 Cart 
        <span th:if="${session.cart != null and !session.cart.empty}"
              style="background: var(--accent-pink); color: white; border-radius: 50%; padding: 0.3rem 0.7rem; font-size: 0.9rem;">
            <span th:text="${session.cart.size()}"></span>
        </span>
    </a>
</div>
        <h1>Browse Our Fresh Treats</h1>

        <div th:if="${products == null or products.empty}" class="no-products">
            <p>No treats available right now... check back soon! 🍪</p>
            <a href="/dashboard" class="btn btn-primary" style="margin-top: 2rem;">Back to Dashboard</a>
        </div>

        <div class="product-grid" th:unless="${products.empty}">
            <div th:each="product : ${products}" class="product-card">
                <img th:src="${product.imageUrl} ?: '/images/cakey.jpg'" 
                     th:alt="${product.name}" 
                     th:title="${product.name}"
                     title="Product Image"
                     class="product-img">
                <div class="product-body">
                    <h3 class="product-name" th:text="${product.name}"></h3>
                    <p class="product-price" th:text="${product.price} + ' KSh'"></p>
                    <p class="product-desc" th:text="${product.description}"></p>

                    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="add-form">
                        <input type="number" name="quantity" value="1" min="1" class="quantity" placeholder="Quantity" required>
                        <button type="submit" class="btn-add">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin: 4rem 0;">
            <a href="/dashboard" class="btn btn-primary">← Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
