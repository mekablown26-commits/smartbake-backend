server.port=8080
server.address=0.0.0.0

# ================================================
# Application name
spring.application.name=SmartBakeBackend

# PostgreSQL connection - exact match
spring.datasource.url=jdbc:postgresql://localhost:5432/smartbake_db
spring.datasource.username=postgres
spring.datasource.password=Ndababy101*

# Force the driver class name (prevents auto-detection issues)
spring.datasource.driver-class-name=org.postgresql.Driver

# Test the connection on startup (helps debug)
spring.datasource.hikari.connection-test-query=SELECT 1

# Hikari pool settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate - force schema update + full logging
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Log every DDL statement
logging.level.org.hibernate.tool.schema.internal=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG

# Thymeleaf - disable cache so changes to HTML files are picked up immediately
spring.thymeleaf.cache=false

# Dev tools - hot reload
spring.devtools.restart.enabled=true

# Extremely detailed logging for connection/auth problems
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.postgresql=DEBUG
logging.level.org.springframework.security=DEBUG

# Disable auto user details service (forces your CustomUserDetailsService)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Increase max file upload size (for product images)
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Customer service contact details (editable from admin later)
app.contact-phone=0712345678
app.whatsapp-link=https://wa.me/254712345678

